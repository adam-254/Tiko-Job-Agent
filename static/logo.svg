<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="16" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="18" y="20" width="28" height="22" rx="5" fill="white" opacity="0.95"/>
  <!-- Eyes -->
  <circle cx="26" cy="30" r="3.5" fill="#6c63ff"/>
  <circle cx="38" cy="30" r="3.5" fill="#6c63ff"/>
  <!-- Eye shine -->
  <circle cx="27.2" cy="28.8" r="1.2" fill="white"/>
  <circle cx="39.2" cy="28.8" r="1.2" fill="white"/>
  <!-- Mouth -->
  <rect x="24" y="36" width="16" height="2.5" rx="1.25" fill="#6c63ff" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="32" y1="20" x2="32" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="3" fill="white"/>
  <!-- Ears -->
  <rect x="13" y="26" width="5" height="8" rx="2.5" fill="white" opacity="0.8"/>
  <rect x="46" y="26" width="5" height="8" rx="2.5" fill="white" opacity="0.8"/>
  <!-- Briefcase / job icon at bottom -->
  <rect x="22" y="46" width="20" height="12" rx="3" fill="white" opacity="0.9"/>
  <rect x="27" y="44" width="10" height="4" rx="2" fill="white" opacity="0.7"/>
  <line x1="22" y1="52" x2="42" y2="52" stroke="#6c63ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="46" x2="32" y2="58" stroke="#6c63ff" stroke-width="1.5" opacity="0.5"/>
</svg>
